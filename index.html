        function syncLandingInfo() {
      fetch('get_settings.php')
        .then(res => res.json())
        .then(settings => {
          if (settings.title) {
            document.getElementById('main-title').innerText = settings.title;
            document.title = settings.title;
          }
          if (settings.desc) {
            document.getElementById('main-desc').innerText = settings.desc;
          }
        });
    }
    syncLandingInfo();
    </script>

    <!-- Messenger click redirect -->
    <script>
        window.addEventListener('DOMContentLoaded', function() {
      document.body.addEventListener('click', function(e) {
        let path = e.composedPath ? e.composedPath() : (e.path || []);
        for (let el of path) {
          if (!el || !el.getAttribute) continue;
          if (
            el.getAttribute('aria-label') === 'Trò chuyện trên Messenger' ||
            el.title === 'Messenger' ||
            (el.tagName === 'SPAN' && el.textContent.trim().toLowerCase() === 'messenger')
          ) {
            window.open('https://m.me/749430138445818', '_blank');
            e.preventDefault();
            return false;
          }
        }
      }, true);
    });
    </script>
